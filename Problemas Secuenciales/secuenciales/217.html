<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Problema 2.17</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        header { display: flex; justify-content: space-between; background: #333; color: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; width: 100%; margin-top: 10px; }
        .btn-next { background: #007bff; margin-top: 20px; }
        #res { margin-top: 20px; font-weight: bold; color: blue; }
    </style>
</head>
<body>
    <header>
        <h1>ANA CONTRERAS</h1>
        <a href="../index.html" class="home-icon">🏠</a>
    </header>
    <div class="container">
        <h2>2.17 Promedio Ponderado</h2>
        <input type="number" id="e1" placeholder="Examen 1 (25%)">
        <input type="number" id="e2" placeholder="Examen 2 (25%)">
        <input type="number" id="e3" placeholder="Examen 3 (50%)">
        <button onclick="calc()">Calcular Promedio</button>
        <div id="res"></div>
        <button class="btn-next" onclick="location.href='218.html'">Siguiente Problema</button>
    </div>
<script>
    function calc() {
        let n1 = document.getElementById('e1').value * 0.25;
        let n2 = document.getElementById('e2').value * 0.25;
        let n3 = document.getElementById('e3').value * 0.50;
        document.getElementById('res').innerText = "Promedio Final: " + (n1+n2+n3).toFixed(2);
    }
</script>
</body>
</html>
